name: ML Retrain

on:
  workflow_dispatch:
    inputs:
      require_min_auc:
        description: Fail if worst-fold AUC is below 0.65
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 6 * * 0"

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-ml.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-ml.txt

      - name: Fetch historical data
        run: python scripts/fetch_historical_data.py --binance-only

      - name: Build feature matrix
        run: python scripts/build_feature_matrix.py

      - name: Train regime model
        run: python scripts/train_regime_model.py --allow-low-auc

      - name: Smoke test inference
        run: python scripts/smoke_ml_inference.py

      - name: Check AUC gate
        if: github.event_name == 'workflow_dispatch' && inputs.require_min_auc == true
        run: |
          AUC=$(cat models/validation_auc_v2.txt | tr -d '[:space:]')
          echo "Worst-fold AUC: $AUC"
          python -c "
          import sys
          auc = float('$AUC')
          if auc < 0.65:
              print(f'AUC {auc:.4f} below minimum 0.65')
              sys.exit(1)
          print(f'AUC gate passed: {auc:.4f}')
          "

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ml-models-${{ github.run_id }}
          path: |
            models/*.pkl
            models/validation_auc_v2.txt
            MODEL_QUALITY_REPORT.md
          if-no-files-found: error
          retention-days: 30
