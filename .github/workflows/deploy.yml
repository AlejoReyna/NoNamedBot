name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: production
        type: choice
        options:
          - production
          - staging
      restart_only:
        description: Skip git pull and pip install; only restart systemd
        required: false
        default: false
        type: boolean
      skip_pre_live_check:
        description: Skip pre_live_check.py (emergency override)
        required: false
        default: false
        type: boolean

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'production' }}

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            if [ -z "$DEPLOY_PATH" ]; then
              DEPLOY_PATH="/home/ubuntu/planb-plus"
            fi
            RESTART_ONLY="${{ github.event_name == 'workflow_dispatch' && inputs.restart_only || false }}"
            SKIP_PRE_LIVE_CHECK="${{ github.event_name == 'workflow_dispatch' && inputs.skip_pre_live_check || false }}"
            cd "$DEPLOY_PATH"

            if [ "$RESTART_ONLY" != "true" ]; then
              git fetch origin
              git checkout main
              git pull --ff-only
              if [ ! -d .venv ]; then
                python3 -m venv .venv
              fi
              source .venv/bin/activate
              python -m pip install --upgrade pip
              python -m pip cache purge || true
              pip install --no-cache-dir -r requirements.txt
            fi

            source .venv/bin/activate
            python scripts/verify_twak_unlock.py

            if [ "$SKIP_PRE_LIVE_CHECK" != "true" ]; then
              python scripts/pre_live_check.py
            fi

            systemctl --user daemon-reload
            systemctl --user restart planb-plus

            for i in $(seq 1 12); do
              if curl -sf http://localhost:8080/health > /dev/null; then
                echo "Health check passed"
                exit 0
              fi
              echo "Waiting for health endpoint (attempt $i/12)..."
              sleep 5
            done

            echo "Health check failed after restart"
            exit 1
